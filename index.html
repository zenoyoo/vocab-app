<style>
  :root {
    --paper: #ece4d3; --card: #fbf7ec; --card-line: #ddd0b4;

  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; background: var(--paper); color: var(--ink);
    font-family: 'Public Sans', -apple-system, sans-serif;
    height: 100%;
  }
  body {
    background-image:
      radial-gradient(circle at 1px 1px, rgba(41,36,29,0.08) 1px, transparent 0),

    background-size: 14px 14px, 100% 100%;
    padding-top: env(safe-area-inset-top);

  }
  #root { max-width: 520px; margin: 0 auto; padding: 22px 18px 44px; min-height: 100vh; }
  #root > * { animation: riseIn .38s cubic-bezier(.2,.7,.3,1) backwards; }

  @keyframes riseIn { from { opacity:0; transform:translateY(8px);} to { opacity:1; transform:translateY(0);} }
  @keyframes cardIn { from { opacity:0; transform:translateY(10px) scale(.98);} to { opacity:1; transform:translateY(0) scale(1);} }
  @keyframes popIn { 0% { transform:scale(.9); opacity:0;} 60% { transform:scale(1.03);} 100% { transform:scale(1); opacity:1;} }
  @keyframes shimmerMove { 0% { background-position: -120px 0;} 100% { background-position: 220px 0;} }

  .eyebrow { font-family: 'IBM Plex Mono', 'Courier New', monospace; font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--teal-deep); margin-bottom: 8px; display:flex; justify-content: space-between; align-items:center;}
  .eyebrow::before { content:'✦'; margin-right:6px; color:var(--rust); }
  .title { font-family: 'Fraunces', Georgia, serif; font-weight: 700; font-size: 32px; letter-spacing:-.01em; margin: 0 0 20px; display:flex; align-items:baseline; justify-content:space-between; gap:12px;}
  .title small { font-family:'IBM Plex Mono', 'Courier New', monospace; font-size:12px; font-weight:500; color:var(--ink-soft); background:var(--card); border:1px solid var(--card-line); padding:3px 9px; border-radius:999px;}

  .flashcard { position:relative; z-index:1; width:100%; min-height:220px; transform-style:preserve-3d; transition:transform .5s cubic-bezier(.4,.2,.2,1); cursor:pointer;}

  .face.back { transform: rotateY(180deg); background:var(--teal-soft); border-color:var(--teal);}

  .faceexample { font-size:14px; line-height:1.6; background:var(--card); padding:10px 14px; border-radius:9px;}
  .faceexampleko { font-size:13px; color:var(--ink-soft); margin-top:6px;}
  .ratebar { display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
  .ratebtn { font-size:13px; font-weight:700; padding:13px 4px; border-radius:10px; border:1.5px solid var(--card-line); background:var(--card); cursor:pointer; color:var(--ink); transition:all .12s ease;}
  .ratebtn:nth-child(1):hover { border-color:var(--rust); background:var(--rust-soft); color:var(--rust-deep);}
  .ratebtn:nth-child(2):hover { border-color:var(--card-line); background:#efe8d6;}
  .ratebtn:nth-child(3):hover, .ratebtn:nth-child(4):hover { border-color:var(--teal); background:var(--teal-soft); color:var(--teal-deep);}
  .quizword { text-align:center; font-family:'Fraunces', Georgia, serif; font-size:31px; font-weight:700; margin-bottom:22px;}

  .quizopt { text-align:left; font-size:15px; padding:15px 16px; border-radius:11px; border:1.5px solid var(--card-line); background:var(--card); cursor:pointer; width:100%; transition:all .12s ease; font-weight:500;}
  .quizopt:hover { border-color:var(--teal); transform:translateX(2px);}
  .quizopt.correct { background:var(--teal-soft); border-color:var(--teal); color:var(--teal-deep); font-weight:700;}
  .quizopt.wrong { background:var(--rust-soft); border-color:var(--rust); color:var(--rust-deep);}
  .donewrap { text-align:center; padding:36px 10px; animation:popIn .4s ease backwards;}
  .donewrap .big { font-family:'Fraunces', Georgia, serif; font-size:26px; font-weight:700; margin-bottom:6px;}

  .modal-overlay { position:fixed; inset:0; background:rgba(41,36,29,.5); display:flex; align-items:flex-end; justify-content:center; z-index:50;}
  .modal { background:var(--paper); border-radius:18px 18px 0 0; padding:22px 20px calc(24px + env(safe-area-inset-bottom)); width:100%; max-width:520px; box-shadow:0 -8px 30px rgba(41,36,29,.25);}
  .modal h3 { font-family:'Fraunces', Georgia, serif; margin:0 0 6px;}
  .modal p { font-size:13px; color:var(--ink-soft); line-height:1.5; margin:0 0 14px;}
</style>

<body>
<div id="root"></div>

<script>
/* ============================= STORAGE ============================= */
const WORDS_KEY = "vocab-catalog-words-v1";
function loadWords() { try { return JSON.parse(localStorage.getItem(WORDS_KEY) || "[]"); } catch { return []; } }
function saveWords(w) { localStorage.setItem(WORDS_KEY, JSON.stringify(w)); }


/* ========================= SPACED REPETITION ========================= */
const DAYS = [0, 1, 3, 7, 16, 35];
const RATING_LABEL = ["다시", "애매", "좋음", "완벽"];
const RATING_DELTA = [-1, 0, 1, 2];
const DAY_MS = 86400000;
const nextReviewFor = (level) => Date.now() + DAYS[Math.max(0, Math.min(level, DAYS.length-1))] * DAY_MS;
const isDue = (w) => w.nextReview <= Date.now();
const daysUntil = (ts) => Math.max(0, Math.ceil((ts - Date.now()) / DAY_MS));
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function esc(s){ return (s||"").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ============================== FREE WORD LOOKUP ============================== */
const POS_KO = {
  noun: "명사", verb: "동사", adjective: "형용사", adverb: "부사",
  pronoun: "대명사", preposition: "전치사", conjunction: "접속사",
  interjection: "감탄사", determiner: "한정사", exclamation: "감탄사",
  phrase: "구", idiom: "숙어", "phrasal verb": "구동사"
};

const TEMPLATES = {
  noun: (w) => `The report highlighted the importance of ${w} in this quarter.`,
  verb: (w) => `Our team decided to ${w} the plan before the deadline.`,
  adjective: (w) => `The proposal seemed ${w} to everyone in the meeting.`,
  adverb: (w) => `She reviewed the contract ${w} before signing it.`,
  default: (w) => `We discussed "${w}" during today's meeting.`
};

async function translateToKo(text) {
  if (!text) return "";
  try {
    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|ko`);
    const data = await res.json();
    return data?.responseData?.translatedText || "";
  } catch {
    return "";
  }
}

// Tries to find a real, natural example sentence (with an existing Korean
// translation) from Tatoeba's crowd-sourced sentence database.
async function fetchTatoebaExample(word) {
  try {
    const res = await fetch(`https://tatoeba.org/en/api_v0/search?from=eng&to=kor&query=${encodeURIComponent(word)}&orphans=no&unapproved=no`);
    if (!res.ok) return null;
    const data = await res.json();
    const results = data?.results || [];
    for (const r of results) {
      const en = r.text;
      const koTrans = (r.translations || []).flat().find(t => t.lang === "kor");
      if (en && koTrans?.text && en.split(" ").length <= 18) {
        return { example: en, exampleKo: koTrans.text };
      }
    }
    // fall back to first English result even without a Korean translation
    if (results[0]?.text) return { example: results[0].text, exampleKo: "" };
    return null;
  } catch {
    return null;
  }
}

async function generateWordInfo(word) {
  const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word.trim())}`);
  if (!res.ok) {
    throw new Error("사전에서 찾을 수 없어요. 철자를 확인해 주세요.");
  }
  const data = await res.json();
  const entry = data[0];
  const meaningBlock = (entry.meanings || [])[0] || {};
  const def = (meaningBlock.definitions || [])[0] || {};
  const posEn = (meaningBlock.partOfSpeech || "").toLowerCase();
  const pos = POS_KO[posEn] || posEn;
  const definitionEn = def.definition || "";
  const synonym = (def.synonyms && def.synonyms[0]) || (meaningBlock.synonyms && meaningBlock.synonyms[0]) || "";
  const finalWord = entry.word || word;

  // 1) try a real example from Tatoeba, 2) fall back to dictionary example,
  // 3) fall back to a POS-based template so an example is never empty.
  let exampleEn = "";
  let exampleKo = "";

  const tatoeba = await fetchTatoebaExample(finalWord);
  if (tatoeba) {
    exampleEn = tatoeba.example;
    exampleKo = tatoeba.exampleKo;
  }
  if (!exampleEn) {
    exampleEn = def.example || "";
  }
  if (!exampleEn) {
    const templateFn = TEMPLATES[posEn] || TEMPLATES.default;
    exampleEn = templateFn(finalWord);
  }

  const [meaningKo, exampleKoFinal] = await Promise.all([
    translateToKo(definitionEn),
    exampleKo ? Promise.resolve(exampleKo) : translateToKo(exampleEn)
  ]);

  return {
    word: finalWord,
    pos,
    meaning: meaningKo || definitionEn,
    example: exampleEn,
    exampleKo: exampleKoFinal,
    synonym
  };
}

/* ============================== STARTER PACK ============================== */
const STARTER_WORDS = [
  "negotiate","revenue","deadline","budget","stakeholder","procurement","forecast",
  "invoice","compliance","leverage","benchmark","outsource","acquisition","merger",
  "liability","asset","dividend","equity","overhead","turnover","quota","tariff",
  "subsidy","inventory","logistics","supplier","vendor","contract","clause",
  "arbitration","agenda","proposal","feasibility","sustainability","initiative",
  "implementation","allocation","expenditure","portfolio","collateral"
];

async function loadStarterPack() {
  const existing = new Set(state.words.map(w => w.word.toLowerCase()));
  const toAdd = STARTER_WORDS.filter(w => !existing.has(w.toLowerCase()));
  if (toAdd.length === 0) {
    setState({ seedErrors: [], seedMessage: "이미 모든 추천 단어가 저장되어 있어요." });
    return;
  }
  setState({ seeding: true, seedProgress: { done: 0, total: toAdd.length }, seedErrors: [], seedMessage: "" });
  let words = [...state.words];
  const errors = [];
  for (let i = 0; i < toAdd.length; i++) {
    try {
      const info = await generateWordInfo(toAdd[i]);
      const entry = {
        id: Date.now() + "-" + Math.random().toString(36).slice(2,7),
        word: info.word, pos: info.pos || "", meaning: info.meaning || "",
        example: info.example || "", exampleKo: info.exampleKo || "", synonym: info.synonym || "",
        level: 0, reviewCount: 0, createdAt: Date.now(), nextReview: Date.now()
      };
      words = [entry, ...words];
      saveWords(words);
    } catch (e) {
      errors.push(toAdd[i]);
    }
    setState({ words, seedProgress: { done: i + 1, total: toAdd.length } });
    await new Promise(r => setTimeout(r, 350));
  }
  setState({
    seeding: false,
    seedErrors: errors,
    seedMessage: errors.length ? `${toAdd.length - errors.length}개 추가 완료 (${errors.length}개는 사전에 없어 건너뜀)` : `${toAdd.length}개 단어를 모두 추가했어요.`
  });
}
let state = {
  words: loadWords(),
  view: "home",
  filter: "all",
  inputWord: "",
  aiLoading: false,
  aiError: "",
  preview: null,
  queue: [],
  cursor: 0,
  flipped: false,
  quizChoice: null,
  seeding: false,
  seedProgress: { done: 0, total: 0 },
  seedErrors: [],
  seedMessage: "",
};

function setState(patch) { Object.assign(state, patch); render(); }

/* =============================== LOGIC =============================== */
async function handleGenerate() {
  const w = state.inputWord.trim();
  if (!w) return;
  setState({ aiLoading: true, aiError: "", preview: null });
  try {
    const info = await generateWordInfo(w);
    setState({ aiLoading: false, preview: info });
  } catch (e) {
    setState({ aiLoading: false, aiError: e.message || "생성에 실패했어요." });
  }
}

function commitPreview() {
  if (!state.preview) return;
  const p = state.preview;
  const entry = {
    id: Date.now() + "-" + Math.random().toString(36).slice(2,7),
    word: p.word, pos: p.pos||"", meaning: p.meaning||"",
    example: p.example||"", exampleKo: p.exampleKo||"", synonym: p.synonym||"",
    level: 0, reviewCount: 0, createdAt: Date.now(), nextReview: Date.now()
  };
  const words = [entry, ...state.words];
  saveWords(words);
  setState({ words, preview: null, inputWord: "" });
}

function deleteWord(id) {
  const words = state.words.filter(w => w.id !== id);
  saveWords(words);
  setState({ words });
}

function startReview() {
  const dueWords = state.words.filter(isDue);
  const pool = shuffle(dueWords);
  const canQuiz = state.words.length >= 4;
  const built = pool.map(w => ({ word: w, type: canQuiz && Math.random()<0.5 ? "quiz" : "flashcard" }));
  const withOptions = built.map(item => {
    if (item.type !== "quiz") return item;
    const distractors = shuffle(state.words.filter(x=>x.id!==item.word.id)).slice(0,3).map(x=>x.meaning);
    return { ...item, options: shuffle([item.word.meaning, ...distractors]) };
  });
  setState({ queue: withOptions, cursor: 0, flipped: false, quizChoice: null, view: "review" });
}

function applyRating(word, ratingIdx) {
  const words = state.words.map(w => {
    if (w.id !== word.id) return w;
    const newLevel = Math.max(0, w.level + RATING_DELTA[ratingIdx]);
    return { ...w, level: newLevel, reviewCount: w.reviewCount+1, nextReview: nextReviewFor(newLevel) };
  });
  saveWords(words);
  return words;
}

function advance(word, ratingIdx) {
  const words = applyRating(word, ratingIdx);
  setState({ words, flipped: false, quizChoice: null, cursor: state.cursor + 1 });
}

function handleQuizPick(word, opt) {
  if (state.quizChoice) return;
  setState({ quizChoice: opt });
  setTimeout(() => advance(word, opt === word.meaning ? 2 : 0), 850);
}

/* =============================== RENDER =============================== */
function render() {
  const root = document.getElementById("root");
  const words = state.words;
  const dueWords = words.filter(isDue);
  const masteredCount = words.filter(w=>w.level>=4).length;

  let html = "";

  if (state.view === "home") {
    html += `
      <div class="eyebrow"><span>VOCAB CATALOG · Zeno's Archive</span></div>
      <div class="title">단어 서랍 <small>${words.length}개 보관 중</small></div>
      <div class="stats">
        <div class="stat"><div class="n">${dueWords.length}</div><div class="l">오늘 복습</div></div>
        <div class="stat"><div class="n">${words.length}</div><div class="l">전체 단어</div></div>
        <div class="stat"><div class="n">${masteredCount}</div><div class="l">마스터</div></div>
      </div>
      <button class="cta" ${dueWords.length===0?"disabled":""} onclick="startReview()">${dueWords.length>0?`오늘의 복습 시작 (${dueWords.length})`:"오늘 복습할 단어가 없어요"}</button>
      <button class="cta secondary" onclick="setState({view:'add'})">+ 새 단어 추가</button>
      <button class="cta secondary" onclick="setState({view:'list'})">전체 단어 보기</button>
      <button class="cta secondary" ${state.seeding?"disabled":""} onclick="loadStarterPack()">📦 ${state.seeding ? `단어팩 불러오는 중… (${state.seedProgress.done}/${state.seedProgress.total})` : "추천 비즈니스 단어팩 불러오기 (40개)"}</button>
      ${state.seedMessage ? `<div class="loading">${esc(state.seedMessage)}</div>` : ""}
    `;
  }

  else if (state.view === "add") {
    html += `<button class="back" onclick="setState({view:'home',preview:null,aiError:''})">← 뒤로</button>
      <div class="title" style="font-size:22px">새 단어 추가</div>
      <div class="addrow">
        <input class="input" id="wordInput" placeholder="영어 단어를 입력하세요 (예: procrastinate)" value="${esc(state.inputWord)}" oninput="state.inputWord=this.value" onkeydown="if(event.key==='Enter')handleGenerate()" />
        <button class="iconbtn" ${state.aiLoading||!state.inputWord.trim()?"disabled":""} onclick="handleGenerate()">＋</button>
      </div>
      ${state.aiLoading ? `<div class="loading">사전에서 뜻과 예문을 찾고 있어요…</div>` : ""}
      ${state.aiError ? `<div class="err">${esc(state.aiError)}</div>` : ""}
    `;
    if (state.preview) {
      const p = state.preview;
      html += `
        <div class="previewcard">
          <div class="pword">${esc(p.word)}</div>
          ${p.pos ? `<span class="ppos">${esc(p.pos)}</span>` : ""}
          <div class="pmeaning">${esc(p.meaning)}</div>
          <div class="pexample">${esc(p.example)}</div>
          <div class="pexampleko">${esc(p.exampleKo)}</div>
          ${p.synonym ? `<div class="psyn">유의어: ${esc(p.synonym)}</div>` : ""}
        </div>
        <button class="cta" style="margin-top:12px" onclick="commitPreview()">＋ 단어장에 저장</button>
      `;
    }
  }

  else if (state.view === "list") {
    const filtered = words.filter(w => {
      if (state.filter==="due") return isDue(w);
      if (state.filter==="mastered") return w.level>=4;
      return true;
    }).sort((a,b)=>a.nextReview-b.nextReview);
    html += `<button class="back" onclick="setState({view:'home'})">← 뒤로</button>
      <div class="title" style="font-size:22px">전체 단어</div>
      <div class="tabs">
        <button class="tab ${state.filter==='all'?'active':''}" onclick="setState({filter:'all'})">전체</button>
        <button class="tab ${state.filter==='due'?'active':''}" onclick="setState({filter:'due'})">복습 대상</button>
        <button class="tab ${state.filter==='mastered'?'active':''}" onclick="setState({filter:'mastered'})">마스터</button>
      </div>`;
    if (filtered.length === 0) html += `<div class="empty">해당하는 단어가 없어요.</div>`;
    html += `<div class="list">`;
    filtered.forEach(w => {
      let tag, statusClass;
      if (w.level>=4) { tag = `<span class="tag mastered">✓ 마스터</span>`; statusClass = "s-mastered"; }
      else if (isDue(w)) { tag = `<span class="tag due">오늘</span>`; statusClass = "s-due"; }
      else { tag = `<span class="tag wait">${daysUntil(w.nextReview)}일 후</span>`; statusClass = "s-wait"; }
      html += `<div class="item ${statusClass}">
        <div><div class="w">${esc(w.word)}</div><div class="m">${esc(w.meaning)}</div></div>
        <div style="display:flex;align-items:center;gap:8px">${tag}<button class="del" onclick="deleteWord('${w.id}')">✕</button></div>
      </div>`;
    });
    html += `</div>`;
  }

  else if (state.view === "review") {
    const item = state.queue[state.cursor];
    const done = state.cursor >= state.queue.length && state.queue.length > 0;
    if (!done && item) {
      html += `<button class="back" onclick="setState({view:'home'})">← 그만하기</button>
        <div class="progress"><div class="progress-bar" style="width:${(state.cursor/state.queue.length)*100}%"></div></div>`;
      if (item.type === "flashcard") {
        html += `<div class="scene">
          <div class="flashcard ${state.flipped?'flipped':''}" onclick="${state.flipped?'':'setState({flipped:true})'}">
            <div class="face front">
              <div class="faceword">${esc(item.word.word)}</div>
              ${item.word.pos?`<div class="facepos">${esc(item.word.pos)}</div>`:""}
              <div class="facehint">탭해서 뜻 보기</div>
            </div>
            <div class="face back">
              <div class="facemeaning">${esc(item.word.meaning)}</div>
              <div class="faceexample">${esc(item.word.example)}</div>
              <div class="faceexampleko">${esc(item.word.exampleKo)}</div>
            </div>
          </div>
        </div>`;
        if (state.flipped) {
          html += `<div class="ratebar">`;
          RATING_LABEL.forEach((label,i) => {
            html += `<button class="ratebtn" onclick='advance(${JSON.stringify(item.word)}, ${i})'>${label}</button>`;
          });
          html += `</div>`;
        }
      } else {
        html += `<div class="quizword">${esc(item.word.word)}</div><div class="quizopts">`;
        item.options.forEach(opt => {
          let cls = "quizopt";
          if (state.quizChoice) {
            if (opt === item.word.meaning) cls += " correct";
            else if (opt === state.quizChoice) cls += " wrong";
          }
          html += `<button class="${cls}" onclick='handleQuizPick(${JSON.stringify(item.word)}, ${JSON.stringify(opt)})'>${esc(opt)}</button>`;
        });
        html += `</div>`;
      }
    } else if (done) {
      html += `<div class="donewrap">
        <div class="big">오늘의 복습 완료 🎉</div>
        <div style="color:var(--ink-soft);font-size:14px;margin-bottom:22px">${state.queue.length}개 단어를 복습했어요.</div>
        <button class="cta" onclick="setState({view:'home'})">서랍으로 돌아가기</button>
      </div>`;
    }
  }

  root.innerHTML = html;

  // restore focus to word input after re-render if it was focused
  const wi = document.getElementById("wordInput");
  if (wi && state.view === "add") {
    const pos = wi.value.length;
    wi.focus();
    wi.setSelectionRange(pos, pos);
  }
}

render();
</script>
</body>
</html>
